apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: temporal
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://go.temporal.io/helm-charts
    chart: temporal
    targetRevision: 0.73.1
    helm:
      valuesObject:
        server:
          image:
            repository: temporalio/server
            tag: 1.29.1
          config:
            persistence:
              defaultStore: default
              default:
                driver: "sql"
                sql:
                  driver: "postgres12"
                  host: postgresql.temporal.svc.cluster.local
                  port: 5432
                  database: temporal
                  user: temporal
                  password: temporal
                  maxConns: 20
                  maxIdleConns: 20
                  maxConnLifetime: "1h"
              visibility:
                driver: "sql"
                sql:
                  driver: "postgres12"
                  host: postgresql.temporal.svc.cluster.local
                  port: 5432
                  database: temporal_visibility
                  user: temporal
                  password: temporal
                  maxConns: 20
                  maxIdleConns: 20
                  maxConnLifetime: "1h"
        admintools:
          enabled: true
        web:
          enabled: true
        schema:
          createDatabase:
            enabled: true
          setup:
            enabled: true
            backoffLimit: 100
          update:
            enabled: true
            backoffLimit: 100
        cassandra:
          enabled: false
        elasticsearch:
          enabled: false
        prometheus:
          enabled: true
        grafana:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: temporal
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
