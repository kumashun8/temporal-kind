---
# Source: temporal/templates/server-job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: temporal-schema-1
  labels:
    app.kubernetes.io/component: database
    app.kubernetes.io/name: temporal
    helm.sh/chart: temporal-0.73.1
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: temporal
    app.kubernetes.io/version: "1.29.1"
    app.kubernetes.io/part-of: temporal
spec:
  backoffLimit: 100
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      name: temporal-schema-1
      labels:
        app.kubernetes.io/component: database
        app.kubernetes.io/name: temporal
        helm.sh/chart: temporal-0.73.1
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/instance: temporal
        app.kubernetes.io/version: "1.29.1"
        app.kubernetes.io/part-of: temporal
    spec:
      serviceAccountName: default
      restartPolicy: OnFailure
      initContainers:
        - name: create-default-store
          image: "temporalio/admin-tools:1.29.1-tctl-1.18.4-cli-1.5.0"
          imagePullPolicy: IfNotPresent
          command: ['temporal-sql-tool', 'create-database']
          env:
            - name: SQL_PLUGIN
              value: postgres12
            - name: SQL_HOST
              value: postgresql.temporal.svc.cluster.local
            - name: SQL_PORT
              value: "5432"
            - name: SQL_DATABASE
              value: temporal
            - name: SQL_USER
              value: temporal
            - name: SQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: temporal-default-store
                  key: password
        - name: create-visibility-store
          image: "temporalio/admin-tools:1.29.1-tctl-1.18.4-cli-1.5.0"
          imagePullPolicy: IfNotPresent
          command: ['temporal-sql-tool', 'create-database']
          env:
            - name: SQL_PLUGIN
              value: postgres12
            - name: SQL_HOST
              value: postgresql.temporal.svc.cluster.local
            - name: SQL_PORT
              value: "5432"
            - name: SQL_DATABASE
              value: temporal_visibility
            - name: SQL_USER
              value: temporal
            - name: SQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: temporal-visibility-store
                  key: password
        - name: setup-default-store
          image: "temporalio/admin-tools:1.29.1-tctl-1.18.4-cli-1.5.0"
          imagePullPolicy: IfNotPresent
          command: ['temporal-sql-tool', 'setup-schema', '-v', '0.0']
          env:
            - name: SQL_PLUGIN
              value: postgres12
            - name: SQL_HOST
              value: postgresql.temporal.svc.cluster.local
            - name: SQL_PORT
              value: "5432"
            - name: SQL_DATABASE
              value: temporal
            - name: SQL_USER
              value: temporal
            - name: SQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: temporal-default-store
                  key: password
        - name: setup-visibility-store
          image: "temporalio/admin-tools:1.29.1-tctl-1.18.4-cli-1.5.0"
          imagePullPolicy: IfNotPresent
          command: ['temporal-sql-tool', 'setup-schema', '-v', '0.0']
          env:
            - name: SQL_PLUGIN
              value: postgres12
            - name: SQL_HOST
              value: postgresql.temporal.svc.cluster.local
            - name: SQL_PORT
              value: "5432"
            - name: SQL_DATABASE
              value: temporal_visibility
            - name: SQL_USER
              value: temporal
            - name: SQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: temporal-visibility-store
                  key: password
        - name: update-default-store
          image: "temporalio/admin-tools:1.29.1-tctl-1.18.4-cli-1.5.0"
          imagePullPolicy: IfNotPresent
          command: ['temporal-sql-tool', 'update-schema', '--schema-dir', '/etc/temporal/schema/postgresql/v12/temporal/versioned']
          env:
            - name: SQL_PLUGIN
              value: postgres12
            - name: SQL_HOST
              value: postgresql.temporal.svc.cluster.local
            - name: SQL_PORT
              value: "5432"
            - name: SQL_DATABASE
              value: temporal
            - name: SQL_USER
              value: temporal
            - name: SQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: temporal-default-store
                  key: password
        - name: update-visibility-store
          image: "temporalio/admin-tools:1.29.1-tctl-1.18.4-cli-1.5.0"
          imagePullPolicy: IfNotPresent
          command: ['temporal-sql-tool', 'update-schema', '--schema-dir', '/etc/temporal/schema/postgresql/v12/visibility/versioned']
          env:
            - name: SQL_PLUGIN
              value: postgres12
            - name: SQL_HOST
              value: postgresql.temporal.svc.cluster.local
            - name: SQL_PORT
              value: "5432"
            - name: SQL_DATABASE
              value: temporal_visibility
            - name: SQL_USER
              value: temporal
            - name: SQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: temporal-visibility-store
                  key: password
      containers:
        - name: done
          image: "temporalio/admin-tools:1.29.1-tctl-1.18.4-cli-1.5.0"
          imagePullPolicy: IfNotPresent
          command: ['sh', '-c', 'echo "Store setup completed"']
